<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wealth Portfolio — Amma Kanakku</title>
  <link rel="icon" href="/icons/icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9px; }

<body class="bg-slate-950 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
const { useEffect, useMemo, useState, useCallback, useRef } = React;

// ─── Constants ──────────────────────────────────────────────────────────────
const TXN_KEY    = 'wpt-v1-txns';
const PRICE_KEY  = 'wpt-v1-prices';

const MARKETS = [
  { id: 'IN_STOCK', label: 'Indian Stock (NSE)', currency: '₹', hint: 'RELIANCE.NS' },
  { id: 'IN_BSE',   label: 'Indian Stock (BSE)', currency: '₹', hint: 'RELIANCE.BO' },
  { id: 'IN_ETF',   label: 'Indian ETF (NSE)',   currency: '₹', hint: 'NIFTYBEES.NS' },
  { id: 'IN_MF',    label: 'Indian Mutual Fund', currency: '₹', hint: '120503 (scheme code)' },
  { id: 'US_STOCK', label: 'US Stock / ETF',     currency: '$', hint: 'AAPL' },
];

function market(id) { return MARKETS.find(m => m.id === id) ?? MARKETS[0]; }
function today()    { return new Date().toISOString().slice(0, 10); }

// ─── Number formatting ────────────────────────────────────────────────────
function fmt(n, dec = 2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function cur(n, sym = '₹', dec = 2) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  return `${n < 0 ? '-' : ''}${sym}${abs.toLocaleString('en-IN', { minimumFractionDigits: dec, maximumFractionDigits: dec })}`;
}
function qty(n) { return fmt(n, n % 1 === 0 ? 0 : 3); }
function sign(n) { return n >= 0 ? '+' : ''; }

// ─── Market data fetching ────────────────────────────────────────────────
async function timedFetch(url, ms = 8000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, { signal: ctrl.signal }); }
  finally { clearTimeout(id); }
}

async function fetchMFPrice(schemeCode) {
  const res = await timedFetch(`https://api.mfapi.in/mf/${encodeURIComponent(schemeCode)}/latest`);
  if (!res.ok) throw new Error(`MFapi HTTP ${res.status}`);
  const d = await res.json();
  const nav = d?.data?.[0]?.nav;
  if (!nav) throw new Error('NAV not found');
  return { price: parseFloat(nav), name: d.meta?.scheme_name || null };
}

async function fetchYahooPrice(ticker) {
  const url = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`;
  let res;
  // Try direct first, then proxy fallback
  try {
    res = await timedFetch(url, 6000);
  } catch {
    const proxy = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
    res = await timedFetch(proxy, 10000);
  }
  if (!res.ok) throw new Error(`Yahoo HTTP ${res.status}`);
  const d = await res.json();
  const result = d?.chart?.result?.[0];
  const price = result?.meta?.regularMarketPrice;
  if (!price) throw new Error('Price not in response');
  return { price, name: result?.meta?.shortName || null };
}

async function fetchPrice(ticker, marketId) {
  if (marketId === 'IN_MF') return fetchMFPrice(ticker);
  return fetchYahooPrice(ticker);
}

// ─── Portfolio computation ───────────────────────────────────────────────
function computeHoldings(txns) {
  const map = {};
  const sorted = [...txns].sort((a, b) => new Date(a.date) - new Date(b.date));
  for (const t of sorted) {
    if (!map[t.ticker]) map[t.ticker] = { ticker: t.ticker, name: t.assetName, marketId: t.marketId, qty: 0, cost: 0, avgBuy: 0 };
    const h = map[t.ticker];
    if (t.type === 'Buy') {
      h.cost += t.qty * t.price;
      h.qty  += t.qty;
    } else {
      const costReduced = t.qty * h.avgBuy;
      h.cost = Math.max(0, h.cost - costReduced);
      h.qty -= t.qty;
    }
    h.avgBuy  = h.qty > 0 ? h.cost / h.qty : 0;
    h.name    = t.assetName;
    h.marketId = t.marketId;
  }
  return Object.values(map).filter(h => h.qty > 1e-6);
}

// ─── Sub-components ──────────────────────────────────────────────────────
function PLChip({ value, pct, sym, size = 'sm' }) {
  const pos   = value >= 0;
  const arrow = pos ? '▲' : '▼';
  const col   = pos ? 'text-emerald-400' : 'text-rose-400';
  const bg    = pos ? 'bg-emerald-950 border-emerald-800' : 'bg-rose-950 border-rose-800';
  const big   = size === 'lg';
  return (
    <span className={`inline-flex items-center gap-1 border rounded-full num font-semibold
      ${big ? 'px-3 py-1 text-base' : 'px-2 py-0.5 text-xs'}
      ${col} ${bg}`}>
      <span className={big ? 'text-sm' : 'text-[10px]'}>{arrow}</span>
      <span>{cur(Math.abs(value), sym)}</span>
      {pct != null && <span className="opacity-70">({fmt(Math.abs(pct))}%)</span>}
    </span>
  );
}

function StatCard({ label, children, accent }) {
  return (
    <div className={`rounded-2xl border p-5 ${accent ? 'bg-slate-800 border-slate-600' : 'bg-slate-900 border-slate-800'}`}>
      <p className="text-xs uppercase tracking-widest text-slate-400 font-medium mb-2">{label}</p>
      {children}
    </div>
  );
}

function Spinner() {
  return <span className="inline-block spin text-slate-400 text-lg leading-none">⟳</span>;
}

function EmptyState({ onAdd }) {
  return (
    <div className="rounded-2xl border border-slate-800 bg-slate-900 p-16 text-center">
      <div className="text-5xl mb-4 select-none">📊</div>
      <p className="text-slate-300 font-semibold mb-1">No holdings tracked yet</p>
      <p className="text-slate-500 text-sm mb-6">Add your first Buy transaction to start tracking your wealth.</p>
      <button onClick={onAdd}
        className="px-5 py-2.5 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-semibold text-sm transition-colors">
        + Add First Transaction
      </button>
    </div>
  );
}

// ─── Transaction Form Modal ───────────────────────────────────────────────
const BLANK = { date: today(), assetName: '', ticker: '', marketId: 'IN_STOCK', type: 'Buy', qty: '', price: '', priority: 3 };

function TxnModal({ initial, onSave, onClose }) {
  const [f, setF] = useState(initial ?? BLANK);
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const m = market(f.marketId);
  const total = parseFloat(f.qty) * parseFloat(f.price);

  function submit(e) {
    e.preventDefault();
    const q = parseFloat(f.qty), p = parseFloat(f.price);
    if (!(q > 0) || !(p > 0)) { alert('Enter valid quantity and price.'); return; }
    if (!f.ticker.trim())      { alert('Ticker / scheme code is required.'); return; }
    onSave({
      id:        f.id ?? (Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
      date:      f.date,
      assetName: (f.assetName.trim() || f.ticker.trim()).toUpperCase().replace(/\./g, ''),
      ticker:    f.ticker.trim().toUpperCase(),
      marketId:  f.marketId,
      type:      f.type,
      qty:       q,
      price:     p,
      priority:  Number(f.priority),
    });
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm p-4" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-lg">
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-800">
          <h2 className="text-lg font-bold">{f.id ? 'Edit Transaction' : 'Add Transaction'}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-white text-2xl leading-none transition-colors">×</button>
        </div>

        <form onSubmit={submit} className="p-6 space-y-4">
          {/* Row 1: Date + Market */}
          <div className="grid grid-cols-2 gap-3">
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Date</span>
              <input type="date" required value={f.date} onChange={e => set('date', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:outline-none focus:border-emerald-500" />
            </label>
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Market</span>
              <select value={f.marketId} onChange={e => set('marketId', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:outline-none focus:border-emerald-500">
                {MARKETS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
              </select>
            </label>
          </div>

          {/* Row 2: Asset name + Ticker */}
          <div className="grid grid-cols-2 gap-3">
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Asset Name</span>
              <input type="text" placeholder="e.g. Reliance Industries" value={f.assetName} onChange={e => set('assetName', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </label>
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">
                {f.marketId === 'IN_MF' ? 'Scheme Code' : 'Ticker Symbol'}
              </span>
              <input type="text" required placeholder={m.hint} value={f.ticker} onChange={e => set('ticker', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm font-mono placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </label>
          </div>

          {/* Row 3: Type + Qty + Price */}
          <div className="grid grid-cols-3 gap-3">
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Type</span>
              <select value={f.type} onChange={e => set('type', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm focus:outline-none focus:border-emerald-500">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
              </select>
            </label>
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Quantity</span>
              <input type="number" required min="0.001" step="any" placeholder="0" value={f.qty} onChange={e => set('qty', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm num placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </label>
            <label className="space-y-1">
              <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Price / Unit ({m.currency})</span>
              <input type="number" required min="0.001" step="any" placeholder="0.00" value={f.price} onChange={e => set('price', e.target.value)}
                className="w-full px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-white text-sm num placeholder-slate-600 focus:outline-none focus:border-emerald-500" />
            </label>
          </div>

          {/* Total preview */}
          {f.qty && f.price && !isNaN(total) && total > 0 && (
            <div className="flex justify-between items-center bg-slate-800 rounded-xl px-4 py-3 border border-slate-700">
              <span className="text-slate-400 text-sm">Transaction Total</span>
              <span className="font-bold text-white num text-base">{cur(total, m.currency)}</span>
            </div>
          )}

          {/* Priority */}
          <div className="space-y-2">
            <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">Priority Level</span>
            <div className="flex items-center gap-2">
              {[1, 2, 3, 4, 5].map(p => (
                <button key={p} type="button" onClick={() => set('priority', p)}
                  className={`w-9 h-9 rounded-xl text-base font-medium border transition-all ${
                    f.priority >= p
                      ? 'bg-amber-500 border-amber-400 text-white shadow-amber-500/30 shadow-md'
                      : 'bg-slate-800 border-slate-700 text-slate-500 hover:border-slate-500'
                  }`}>★</button>
              ))}
              <span className="text-slate-400 text-sm ml-1">{f.priority} / 5</span>
            </div>
          </div>

          {/* Footer */}
          <div className="flex gap-2 justify-end pt-2 border-t border-slate-800">
            <button type="button" onClick={onClose}
              className="px-4 py-2 rounded-xl border border-slate-700 text-slate-300 hover:text-white hover:border-slate-500 text-sm transition-colors">
              Cancel
            </button>
            <button type="submit"
              className={`px-5 py-2 rounded-xl text-white text-sm font-semibold transition-colors ${
                f.type === 'Buy' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-rose-600 hover:bg-rose-500'
              }`}>
              {f.id ? 'Update' : `Save ${f.type}`}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── Manual Price Inline Editor ──────────────────────────────────────────
function ManualPriceCell({ ticker, priceData, onSave }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal]         = useState('');

  if (editing) {
    return (
      <span className="inline-flex items-center gap-1">
        <input autoFocus type="number" step="any" value={val} onChange={e => setVal(e.target.value)}
          placeholder="Price"
          className="w-20 px-2 py-0.5 rounded bg-slate-800 border border-emerald-600 text-white text-xs num text-right focus:outline-none"
          onKeyDown={e => {
            if (e.key === 'Enter')  { const v = parseFloat(val); if (v > 0) onSave(v); setEditing(false); }
            if (e.key === 'Escape') setEditing(false);
          }} />
        <button onClick={() => { const v = parseFloat(val); if (v > 0) onSave(v); setEditing(false); }}
          className="text-emerald-400 hover:text-emerald-300 text-xs leading-none">✓</button>
        <button onClick={() => setEditing(false)}
          className="text-slate-500 hover:text-slate-300 text-xs leading-none">✕</button>
      </span>
    );
  }

  return (
    <button
      onClick={() => { setVal(String(priceData?.price ?? '')); setEditing(true); }}
      className="text-slate-500 hover:text-slate-300 text-xs underline underline-offset-2 transition-colors">
      {priceData?.manual ? 'manual ✏' : 'set price'}
    </button>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────
function App() {
  const [txns,      setTxns]      = useState([]);
  const [prices,    setPrices]    = useState({});
  const [tab,       setTab]       = useState('holdings');
  const [modal,     setModal]     = useState(null);   // null | 'add' | txn-object
  const [refreshing, setRefreshing] = useState(false);
  const fetchedRef  = useRef(false);

  // Persist
  useEffect(() => {
    try {
      setTxns(JSON.parse(localStorage.getItem(TXN_KEY)   || '[]'));
      setPrices(JSON.parse(localStorage.getItem(PRICE_KEY) || '{}'));
    } catch {}
  }, []);
  useEffect(() => { localStorage.setItem(TXN_KEY,   JSON.stringify(txns));   }, [txns]);
  useEffect(() => { localStorage.setItem(PRICE_KEY, JSON.stringify(prices)); }, [prices]);

  const holdings = useMemo(() => computeHoldings(txns), [txns]);

  // Live price refresh
  const refreshPrices = useCallback(async () => {
    if (holdings.length === 0) return;
    setRefreshing(true);
    for (const h of holdings) {
      const m = market(h.marketId);
      setPrices(p => ({ ...p, [h.ticker]: { ...p[h.ticker], loading: true, error: null } }));
      try {
        const { price, name } = await fetchPrice(h.ticker, h.marketId);
        setPrices(p => ({
          ...p,
          [h.ticker]: { price, currency: m.currency, updatedAt: new Date().toISOString(), loading: false, error: null, manual: false },
        }));
        // Auto-update asset name if live API returns one
        if (name) {
          setTxns(prev => prev.map(t =>
            t.ticker === h.ticker && t.assetName === t.ticker ? { ...t, assetName: name } : t
          ));
        }
      } catch (err) {
        setPrices(p => ({ ...p, [h.ticker]: { ...p[h.ticker], loading: false, error: String(err.message).slice(0, 60) } }));
      }
    }
    setRefreshing(false);
  }, [holdings]);

  // Auto-fetch on first meaningful render
  useEffect(() => {
    if (!fetchedRef.current && holdings.length > 0) {
      fetchedRef.current = true;
      refreshPrices();
    }
  }, [holdings.length]);

  // Portfolio totals (per currency)
  const totals = useMemo(() => {
    const bySymbol = {};
    for (const h of holdings) {
      const m  = market(h.marketId);
      const pd = prices[h.ticker];
      if (!bySymbol[m.currency]) bySymbol[m.currency] = { invested: 0, value: 0, sym: m.currency, complete: true };
      bySymbol[m.currency].invested += h.cost;
      if (pd?.price) bySymbol[m.currency].value += h.qty * pd.price;
      else           bySymbol[m.currency].complete = false;
    }
    return Object.values(bySymbol).map(g => ({
      ...g,
      pl:    g.value - g.invested,
      plPct: g.invested > 0 ? ((g.value - g.invested) / g.invested) * 100 : 0,
    }));
  }, [holdings, prices]);

  // CRUD
  function saveTxn(record) {
    setTxns(prev => prev.some(t => t.id === record.id)
      ? prev.map(t => t.id === record.id ? record : t)
      : [...prev, record]
    );
    setModal(null);
    // Fetch price for the new ticker if not already cached
    if (!prices[record.ticker]) {
      const m = market(record.marketId);
      setPrices(p => ({ ...p, [record.ticker]: { loading: true } }));
      fetchPrice(record.ticker, record.marketId)
        .then(({ price }) => setPrices(p => ({ ...p, [record.ticker]: { price, currency: m.currency, updatedAt: new Date().toISOString(), loading: false, error: null, manual: false } })))
        .catch(err => setPrices(p => ({ ...p, [record.ticker]: { ...p[record.ticker], loading: false, error: String(err.message) } })));
    }
  }

  function deleteTxn(id) {
    if (confirm('Delete this transaction?')) setTxns(prev => prev.filter(t => t.id !== id));
  }

  function setManualPrice(ticker, marketId, value) {
    const m = market(marketId);
    setPrices(p => ({ ...p, [ticker]: { price: value, currency: m.currency, updatedAt: new Date().toISOString(), loading: false, error: null, manual: true } }));
  }

  const sortedTxns = useMemo(() => [...txns].sort((a, b) => new Date(b.date) - new Date(a.date)), [txns]);

  // ── Render ────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-slate-950">
      {/* ── Header ── */}
      <header className="sticky top-0 z-20 bg-slate-950/95 backdrop-blur border-b border-slate-800">
        <div className="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3 min-w-0">
            <div className="h-9 w-9 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 grid place-items-center text-white font-black text-sm shrink-0 shadow-emerald-500/30 shadow-md">W</div>
            <div className="min-w-0">
              <h1 className="font-bold text-base leading-tight truncate">Wealth Portfolio</h1>
              <p className="text-slate-500 text-[11px] leading-tight hidden sm:block">Multi-asset tracker · IN &amp; US Markets</p>
            </div>
          </div>

          <div className="flex items-center gap-2 shrink-0">
            <a href="/index.html"
              className="hidden sm:inline-flex items-center gap-1 text-slate-400 hover:text-slate-200 text-xs px-3 py-1.5 rounded-lg border border-slate-800 hover:border-slate-600 transition-colors">
              ← Budget Tracker
            </a>
            <button onClick={refreshPrices} disabled={refreshing || holdings.length === 0}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-colors disabled:opacity-40">
              {refreshing ? <Spinner /> : <span className="text-base leading-none">↻</span>}
              <span className="hidden sm:inline">Refresh Prices</span>
            </button>
            <button onClick={() => setModal('add')}
              className="flex items-center gap-1.5 text-xs sm:text-sm px-3 sm:px-4 py-1.5 sm:py-2 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-semibold transition-colors shadow-emerald-600/25 shadow-md">
              + <span className="hidden sm:inline">Add Transaction</span><span className="sm:hidden">Add</span>
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 space-y-6">

        {/* ── Summary Cards ── */}
        {totals.length > 0 && (
          <section className="space-y-3">
            {totals.map(g => (
              <div key={g.sym} className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                <StatCard label={`Portfolio Value (${g.sym})`} accent>
                  <p className="text-3xl font-black num text-white tracking-tight">{cur(g.value, g.sym)}</p>
                  {!g.complete && <p className="text-amber-500 text-xs mt-1">⚠ Some prices pending</p>}
                </StatCard>
                <StatCard label="Total Invested">
                  <p className="text-2xl font-bold num text-slate-200">{cur(g.invested, g.sym)}</p>
                </StatCard>
                <StatCard label="Total P &amp; L">
                  <div className="mt-1">
                    <PLChip value={g.pl} sym={g.sym} size="lg" />
                  </div>
                </StatCard>
                <StatCard label="Overall Return">
                  <p className={`text-3xl font-black num tracking-tight ${g.pl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {sign(g.pl)}{fmt(g.plPct)}%
                  </p>
                  <p className={`text-xs mt-1 font-medium ${g.pl >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                    {g.pl >= 0 ? '▲ Profitable' : '▼ In loss'}
                  </p>
                </StatCard>
              </div>
            ))}
          </section>
        )}

        {/* ── Tab Bar ── */}
        <div className="flex gap-1 bg-slate-900/80 rounded-xl p-1 w-fit border border-slate-800">
          {[
            { id: 'holdings',     label: 'Holdings',     count: holdings.length },
            { id: 'transactions', label: 'Transactions', count: txns.length },
          ].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${
                tab === t.id ? 'bg-slate-700 text-white shadow' : 'text-slate-400 hover:text-slate-200'
              }`}>
              {t.label}
              {t.count > 0 && (
                <span className={`ml-1.5 text-[11px] px-1.5 py-0.5 rounded-full ${
                  tab === t.id ? 'bg-slate-600 text-slate-200' : 'bg-slate-800 text-slate-500'
                }`}>{t.count}</span>
              )}
            </button>
          ))}
        </div>

        {/* ── Holdings Table ── */}
        {tab === 'holdings' && (
          <>
            {holdings.length === 0
              ? <EmptyState onAdd={() => setModal('add')} />
              : (
                <div className="rounded-2xl border border-slate-800 bg-slate-900 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="min-w-full text-sm">
                      <thead>
                        <tr className="border-b border-slate-800">
                          {['Asset', 'Qty', 'Avg Buy', 'Live Price', 'Curr Value', 'P & L', 'Return %', ''].map((h, i) => (
                            <th key={i} className={`py-3 px-4 text-xs uppercase tracking-widest font-medium text-slate-500 ${i === 0 ? 'text-left' : i === 7 ? 'text-center' : 'text-right'}`}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800/60">
                        {holdings.map(h => {
                          const m   = market(h.marketId);
                          const pd  = prices[h.ticker];
                          const lp  = pd?.price ?? null;
                          const cv  = lp != null ? h.qty * lp : null;
                          const pl  = cv != null ? cv - h.cost : null;
                          const pct = pl != null && h.cost > 0 ? (pl / h.cost) * 100 : null;
                          const pos = pl != null ? pl >= 0 : null;
                          return (
                            <tr key={h.ticker} className="hover:bg-slate-800/40 transition-colors group">
                              {/* Asset */}
                              <td className="px-4 py-4 min-w-[180px]">
                                <div className="font-semibold text-white">{h.name}</div>
                                <div className="flex items-center gap-2 mt-0.5">
                                  <span className="font-mono text-xs text-slate-400">{h.ticker}</span>
                                  <span className="text-[10px] px-1.5 py-0.5 rounded bg-slate-800 border border-slate-700 text-slate-500 font-medium">
                                    {m.label.replace(' (NSE)', '').replace(' (BSE)', '')}
                                  </span>
                                </div>
                              </td>
                              {/* Qty */}
                              <td className="px-4 py-4 text-right num text-slate-300 font-medium">{qty(h.qty)}</td>
                              {/* Avg Buy */}
                              <td className="px-4 py-4 text-right num text-slate-300">{cur(h.avgBuy, m.currency)}</td>
                              {/* Live Price */}
                              <td className="px-4 py-4 text-right">
                                {pd?.loading
                                  ? <span className="text-slate-500 text-xs animate-pulse">fetching…</span>
                                  : lp != null
                                    ? <span className="num font-semibold text-white">{cur(lp, m.currency)}</span>
                                    : <span className="text-slate-600 text-xs">{pd?.error ? '⚠ error' : '—'}</span>
                                }
                              </td>
                              {/* Current Value */}
                              <td className="px-4 py-4 text-right num font-semibold">
                                {cv != null ? <span className="text-white">{cur(cv, m.currency)}</span> : <span className="text-slate-600">—</span>}
                              </td>
                              {/* P&L */}
                              <td className="px-4 py-4 text-right">
                                {pl != null
                                  ? <PLChip value={pl} sym={m.currency} />
                                  : <span className="text-slate-600 text-xs">—</span>
                                }
                              </td>
                              {/* Return % */}
                              <td className="px-4 py-4 text-right">
                                {pct != null ? (
                                  <span className={`num font-bold text-base ${pos ? 'text-emerald-400' : 'text-rose-400'}`}>
                                    {sign(pct)}{fmt(pct)}%
                                  </span>
                                ) : <span className="text-slate-600 text-xs">—</span>}
                              </td>
                              {/* Manual price */}
                              <td className="px-4 py-4 text-center">
                                <ManualPriceCell
                                  ticker={h.ticker}
                                  priceData={pd}
                                  onSave={v => setManualPrice(h.ticker, h.marketId, v)}
                                />
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>

                      {/* Totals footer */}
                      {totals.map(g => (
                        <tfoot key={g.sym} className="border-t-2 border-slate-700 bg-slate-800/50">
                          <tr>
                            <td colSpan={4} className="px-4 py-3 text-xs uppercase tracking-widest text-slate-500 font-medium">
                              Total ({g.sym})
                            </td>
                            <td className="px-4 py-3 text-right num font-black text-white text-base">{cur(g.value, g.sym)}</td>
                            <td className="px-4 py-3 text-right">
                              <PLChip value={g.pl} sym={g.sym} />
                            </td>
                            <td className="px-4 py-3 text-right">
                              <span className={`num font-black text-lg ${g.pl >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                {sign(g.pl)}{fmt(g.plPct)}%
                              </span>
                            </td>
                            <td />
                          </tr>
                        </tfoot>
                      ))}
                    </table>
                  </div>

                  {/* CORS hint */}
                  {holdings.some(h => prices[h.ticker]?.error) && (
                    <div className="px-5 py-3 border-t border-slate-800 flex items-start gap-2 text-amber-500 text-xs">
                      <span className="mt-0.5 shrink-0">⚠</span>
                      <span>
                        Some prices failed to load (possible CORS restriction in browser).
                        Use <strong>set price</strong> to enter current prices manually, or try opening the app via a server / local file with relaxed CORS.
                        MF NAV via <code>mfapi.in</code> usually works without issues.
                      </span>
                    </div>
                  )}
                </div>
              )
            }
          </>
        )}

        {/* ── Transactions Table ── */}
        {tab === 'transactions' && (
          <>
            {txns.length === 0
              ? <EmptyState onAdd={() => setModal('add')} />
              : (
                <div className="rounded-2xl border border-slate-800 bg-slate-900 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="min-w-full text-sm">
                      <thead>
                        <tr className="border-b border-slate-800">
                          {['Date', 'Asset', 'Market', 'Type', 'Qty', 'Price / Unit', 'Total', 'Priority', ''].map((h, i) => (
                            <th key={i} className={`py-3 px-4 text-xs uppercase tracking-widest font-medium text-slate-500 whitespace-nowrap ${
                              i === 0 || i === 1 || i === 2 ? 'text-left' : i === 8 ? 'text-center' : 'text-right'
                            }`}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800/60">
                        {sortedTxns.map(t => {
                          const m     = market(t.marketId);
                          const total = t.qty * t.price;
                          const stars = '★'.repeat(t.priority) + '☆'.repeat(5 - t.priority);
                          return (
                            <tr key={t.id} className="hover:bg-slate-800/40 transition-colors group">
                              <td className="px-4 py-3.5 text-slate-300 whitespace-nowrap num">{t.date}</td>
                              <td className="px-4 py-3.5 min-w-[160px]">
                                <div className="font-medium text-white">{t.assetName}</div>
                                <div className="font-mono text-xs text-slate-500 mt-0.5">{t.ticker}</div>
                              </td>
                              <td className="px-4 py-3.5 text-xs text-slate-400 whitespace-nowrap">{m.label}</td>
                              <td className="px-4 py-3.5">
                                <span className={`text-xs font-bold px-2.5 py-1 rounded-full border ${
                                  t.type === 'Buy'
                                    ? 'text-emerald-400 bg-emerald-950 border-emerald-800'
                                    : 'text-rose-400 bg-rose-950 border-rose-800'
                                }`}>
                                  {t.type === 'Buy' ? '▲ ' : '▼ '}{t.type}
                                </span>
                              </td>
                              <td className="px-4 py-3.5 text-right num text-slate-200">{qty(t.qty)}</td>
                              <td className="px-4 py-3.5 text-right num text-slate-200">{cur(t.price, m.currency)}</td>
                              <td className="px-4 py-3.5 text-right num font-semibold text-white">{cur(total, m.currency)}</td>
                              <td className="px-4 py-3.5 text-right text-amber-400 tracking-[2px]">{stars}</td>
                              <td className="px-4 py-3.5 text-center">
                                <div className="flex items-center gap-1 justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => setModal({ ...t, id: t.id })}
                                    title="Edit"
                                    className="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors text-sm">
                                    ✏
                                  </button>
                                  <button onClick={() => deleteTxn(t.id)}
                                    title="Delete"
                                    className="p-1.5 rounded-lg text-slate-400 hover:text-rose-400 hover:bg-slate-700 transition-colors text-sm">
                                    ✕
                                  </button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              )
            }
          </>
        )}
      </main>

      <footer className="text-center text-slate-700 text-xs py-10 border-t border-slate-900 mt-10">
        <p>Live prices: Yahoo Finance (stocks/ETFs) · MFapi.in (Indian MF NAV)</p>
        <p className="mt-1">All data stored locally in your browser · Amma Kanakku Wealth Portfolio</p>
      </footer>

      {/* ── Modal ── */}
      {modal && (
        <TxnModal
          initial={modal === 'add' ? null : { ...modal }}
          onSave={saveTxn}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
